<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PDF Reader & Editor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="pdf-styles.css">
  
  <!-- PDF.js library for rendering the PDF to Canvas (Mozilla) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <!-- Set the worker source for pdf.js -->
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>
  
  <!-- pdf-lib for modifying and saving the PDF -->
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
</head>
<body>

  <!-- Top Toolbar -->
  <div class="toolbar">
    <div class="toolbar-group">
      <label for="file-upload" class="toolbar-button" style="cursor: pointer; background: #3b82f6; color: white; padding: 6px 12px; border-radius: 4px; font-size: 14px; font-weight: 500;">
        Open Local PDF
      </label>
      <input type="file" id="file-upload" accept="application/pdf">
      
      <span id="file-name-display" style="margin-left: 10px; font-size: 14px; color: var(--text-primary); opacity: 0.7;">No file selected</span>
    </div>

    <div class="toolbar-group">
      <button id="btn-prev">Previous</button>
      <span class="page-info">Page: <span id="page-num">0</span> / <span id="page-count">0</span></span>
      <button id="btn-next">Next</button>
      
      <div style="width: 20px;"></div> <!-- spacer -->
      
      <button id="btn-zoom-out">- Zoom</button>
      <span id="zoom-level">100%</span>
      <button id="btn-zoom-in">+ Zoom</button>
    </div>

    <div class="toolbar-group">
      <button id="btn-add-text">✏️ Add Text</button>
      <button id="btn-save-pdf" class="primary">💾 Save & Download PDF</button>
    </div>
  </div>

  <!-- PDF Viewer -->
  <div class="viewer-container" id="viewer-container">
    <div class="pdf-wrapper" id="pdf-wrapper">
      <!-- pdf.js renders pages to this canvas -->
      <canvas id="pdf-canvas"></canvas>
      
      <!-- Overlay layer for adding text -->
      <div id="text-layer" class="text-layer"></div>
    </div>
  </div>

  <script src="pdf-app.js"></script>
</body>
</html>
